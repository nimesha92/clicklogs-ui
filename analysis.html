<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tap Logs Analysis</title>
</head>
<body>
  <h2>Tap Data Analysis</h2>
  <div id="result">Loading...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCgpDKpDgWRduAaU10YbN0UaF53O5fCbUE",
    authDomain: "clicklogs-44449.firebaseapp.com",
    projectId: "clicklogs-44449",
    storageBucket: "clicklogs-44449.firebasestorage.app",
    messagingSenderId: "1024274233277",
    appId: "1:1024274233277:web:e059e96fb2bd91fcb844d4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function average(arr) {
    if (arr.length === 0) return "No data";
    const sum = arr.reduce((a, b) => a + b, 0);
    return (sum / arr.length).toFixed(2);
  }

  async function runAnalysis() {
    try {
      const snapshot = await getDocs(collection(db, "tap_logs"));

      const androidDurations = [];
      const pcDurations = [];
      const feedbackDurations = [];
      const noFeedbackDurations = [];

      snapshot.forEach((doc) => {
        const data = doc.data();
        const duration = Number(data.duration_ms);

        if (!isNaN(duration)) {
          if (data.device_platform === "android") {
            androidDurations.push(duration);
          }
          if (data.device_platform === "pc") {
            pcDurations.push(duration);
          }
          if (data.interface_type === "feedbackshown") {
            feedbackDurations.push(duration);
          }
          if (data.interface_type === "nofeedback") {
            noFeedbackDurations.push(duration);
          }
        }
      });

      document.getElementById("result").innerHTML = `
        <h3>Mean Tap Duration by Device</h3>
        <p><b>Android:</b> ${average(androidDurations)} ms</p>
        <p><b>PC:</b> ${average(pcDurations)} ms</p>

        <h3>Mean Tap Duration by Interface</h3>
        <p><b>Feedback Shown:</b> ${average(feedbackDurations)} ms</p>
        <p><b>No Feedback:</b> ${average(noFeedbackDurations)} ms</p>
      `;
    } catch (error) {
      console.error(error);
      document.getElementById("result").innerHTML = "Error loading data";
    }
  }

  runAnalysis();
</script>
</body>
</html>
